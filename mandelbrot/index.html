<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Mandelbrot</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" type="text/css" href="/base.css" />
    </head>
    <body>
        <main class="page wide stack">
            <a href="/">Home</a>
            <h1>Mandelbrot</h1>
            <form onsubmit="event.preventDefault()">
                <div>
                    <label>Iterations: 
                        <input id="iterationsInput" type="number" min="1" value="50" onchange="setIterations(this.value)" onkeyup="setIterations(this.value)" />
                    </label>
                    <input type="button" id="resetButton" value="Reset" onclick="resetViewport()" />
                </div>
            </form>
            <p>Zoom in: left-click / mouse wheel up. Zoom out: right-click / mouse wheel down.</p>
            <canvas id="canvas" width="600" height="400" style="width: 100%"></canvas>
        </main>
        <script src="main.js"></script>
    </body>
</html>
