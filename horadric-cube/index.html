<!doctype html>
<html>
    <head>
        <title>Horadric Cube</title>
        <link rel="stylesheet" type="text/css" href="/base.css" />
        <link rel="stylesheet" type="text/css" href="cube.css" />
    </head>
    <body>
        <main class="page stack">
            <a href="/">Home</a>
            <h1>Horadric Cube</h1>
            <div id="toolbox"></div>
            <div class="flex-horizontal">
                <div class="flex-vertical">
                    <h2>Cube</h2>
                    <button id="clear-cube-button" onclick="clearContents(horadricCube)">Clear</button>
                    <div id="horadricCube"></div>
                    <button onclick="transmute()">Transmute</button>
                </div>
                <div class="flex-vertical">
                    <h2>Inventory</h2>
                    <button id="clearInventoryButton" onclick="clearContents(inventory)">Clear</button>
                    <div id="inventory" class="slotted" data-slots="40"></div>
                </div>
            </div>
            <div class="flex-vertical">
                <h2>Rules</h2>
                <ul id="ruleList"></ul>
            </div>
        </main>
        <script src="cube.js"></script>
    </body>
</html>
